<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniNest Admin Login</title>
  <link rel="stylesheet" href="admin.css">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .login-card { width: min(430px, 100%); }
    .login-card .brand { height: auto; border: 0; justify-content: center; padding: 0 0 22px; }
    .login-card form { display: grid; gap: 16px; padding: 24px; }
    .login-card label { font-weight: 800; }
    .login-card input { border: 1px solid var(--line); border-radius: 8px; padding: 13px 14px; font-size: 17px; }
    .login-options { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
  </style>
</head>
<body>
  <section class="card login-card">
    <div class="brand"><img src="uninest-logo.png" width="100" height="100" alt="UniNest logo"><span>UniNest</span></div>
    <form action="LoginServlet" method="post">
      <h1 style="font-size:34px">Admin Login</h1>
      <label for="adminEmail">Email</label>
      <input id="adminEmail" type="email" name="adminEmail" placeholder="Enter email" required>
      <label for="adminPassword">Password</label>
      <input id="adminPassword" type="password" name="adminPassword" placeholder="Enter password" required>
      <div class="login-options">
        <label><input type="checkbox" name="rememberMe" value="true"> Remember me</label>
        <a href="ForgotPasswordServlet">Forgot password?</a>
      </div>
      <button class="btn" type="submit" name="loginBtn" value="adminLogin">Login</button>
    </form>
  </section>
</body>
</html>
